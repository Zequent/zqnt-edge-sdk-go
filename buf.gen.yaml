version: v2

inputs:
  - module: buf.build/zqnt/protos:1.0.0-PR3-6bf7cc5-SNAPSHOT

plugins:
  # Generates message structs and enums (*.pb.go)
  - remote: buf.build/protocolbuffers/go
    out: gen/proto
    opt:
      - paths=source_relative

  # Generates gRPC client stubs and server interfaces (*_grpc.pb.go)
  - remote: buf.build/grpc/go
    out: gen/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
