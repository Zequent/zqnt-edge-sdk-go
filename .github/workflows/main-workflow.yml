name: Main

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Authenticate buf.build
        run: |
          echo "machine buf.build login ${{ secrets.BUF_TOKEN }} password ${{ secrets.BUF_TOKEN }}" >> ~/.netrc
      - name: Get dependencies
        env:
          GONOSUMDB: "buf.build/*"
          GOPRIVATE: "buf.build/*"
        run: |
          go mod tidy
          go mod download
          go mod vendor

      - name: Build
        run: go build -mod=vendor ./...

      - name: Test
        run: go test -mod=vendor -race -count=1 ./...

      - name: Vet
        run: go vet -mod=vendor ./...

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
