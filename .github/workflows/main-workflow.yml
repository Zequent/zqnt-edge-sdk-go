name: Main

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      GOPROXY: "https://buf.build/gen/go,https://proxy.golang.org,direct"
      GONOSUMDB: "buf.build/*"
      GOPRIVATE: "buf.build/*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Authenticate buf.build
        run: |
          echo "machine buf.build login ${{ secrets.BUF_TOKEN }} password ${{ secrets.BUF_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
