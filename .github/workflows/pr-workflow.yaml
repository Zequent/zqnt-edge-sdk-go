name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOPROXY: "https://buf.build/gen/go,https://proxy.golang.org,direct"
      GONOSUMDB: "buf.build/*"
      GOPRIVATE: "buf.build/*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Authenticate buf.build
        run: |
          echo "machine buf.build login ${{ secrets.BUF_TOKEN }} password ${{ secrets.BUF_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      GOPROXY: "https://buf.build/gen/go,https://proxy.golang.org,direct"
      GONOSUMDB: "buf.build/*"
      GOPRIVATE: "buf.build/*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Authenticate buf.build
        run: |
          echo "machine buf.build login ${{ secrets.BUF_TOKEN }} password ${{ secrets.BUF_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...
